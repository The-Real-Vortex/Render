# Redis persistence and ACL config for local development.

# RDB snapshots (point-in-time backups)
save 900 1
save 300 10
save 60 10000

# AOF logs every write operation so DB can be recreated after restart.
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec

# Use ACL users instead of anonymous/default access.
aclfile /usr/local/etc/redis/users.acl

# Bind and protected mode are fine for local docker usage.
bind 0.0.0.0
protected-mode yes
